<!--Basic_Html_4.html-->

<!DOCTYPE html>
<html>
    
	<body>
	  
	    <style>
		.font_1 {
		background-color: black;
		color: yellow;
		font-size: large;
		}
		
		.font_2 {
		background-color: darkblue;
		color: white;
		font_size: medium;
		}
		
	    .My_Style {
		background-color: yellow;
		color: green;
	    text-decoration: underline;
		font-weight: bold;
		font-size: small;
		}
	    </style>
	
	    <h2 class="My_Style">This h2 element is styled per class attribute font_1</h2>
	    <h3 class="My_Style">This h3 element is styled per class attribute font_2</h3>
	    <h4 class="My_Style">Even though this is an h4 element, it is styled the same
	    as the h2 element because we pointed to the class attribute font_1</h4>
	    <p class="My_Style">This paragraph is written in my style!</p>
		
	</body>
	
</html>
